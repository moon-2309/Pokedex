<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Retro Edition</title>
    <style>
      /* Import retro pixel font */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow-x: hidden;
    background: #1e1e2e;
}

/* Page transitions */
.page {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.5s ease-in-out;
    pointer-events: none;
    overflow-y: auto;
}

.page.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
}

.page.exit-left {
    transform: translateX(-100%);
    opacity: 0;
}

/* Intro Page */
#intro-page {
    background: linear-gradient(to bottom, #dc2626, #991b1b);
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: 
        linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent);
    background-size: 50px 50px;
}

.intro-container {
    text-align: center;
    padding: 20px;
}

.intro-content {
    animation: fadeIn 0.5s ease-in;
}

.retro-title {
    font-size: clamp(2rem, 8vw, 6rem);
    color: #fde047;
    text-shadow: 0 8px 0 rgba(0, 0, 0, 0.3);
    margin-bottom: 10px;
    animation: slideDown 0.8s ease-out;
}

.title-bar {
    height: 8px;
    background: #fde047;
    width: 264px;
    margin: 0 auto 40px;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
}

.intro-box {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border: 4px solid #fde047;
    border-radius: 8px;
    padding: 30px;
    display: inline-block;
    margin-bottom: 30px;
    animation: scaleIn 0.5s ease-out 0.6s both;
}

.tagline {
    color: white;
    font-size: clamp(0.8rem, 2vw, 1.5rem);
}

.retro-button {
    background: #fde047;
    color: #991b1b;
    border: 4px solid #fbbf24;
    border-radius: 8px;
    padding: 15px 50px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.8rem, 2vw, 1.2rem);
    cursor: pointer;
    box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 0.3);
    transition: all 0.1s ease;
    margin-bottom: 20px;
}

.retro-button:hover {
    transform: scale(1.05);
}

.retro-button:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 0.3);
}

.hint-text {
    color: #fef08a;
    font-size: 0.6rem;
    margin-top: 20px;
}

.pulse-dots {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 30px;
}

.dot {
    width: 15px;
    height: 15px;
    background: #fde047;
    border-radius: 50%;
    animation: pulse 2s infinite;
}

.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

/* List Page */
#list-page {
    background: linear-gradient(to bottom, #1e3a8a, #172554);
}

.header {
    background: #dc2626;
    border-bottom: 8px solid #fbbf24;
    padding: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1280px;
    margin: 0 auto;
}

.header-title {
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: #fde047;
    text-align: center;
    text-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
}

.pokemon-count {
    text-align: center;
    color: #fef08a;
    font-size: 0.7rem;
    margin-top: 10px;
}

.type-filter {
    background: #b91c1c;
    border-bottom: 4px solid #fbbf24;
    padding: 16px;
    position: sticky;
    top: 120px;
    z-index: 99;
    overflow-x: auto;
}

.type-buttons {
    display: flex;
    gap: 10px;
    max-width: 1280px;
    margin: 0 auto;
    flex-wrap: nowrap;
    padding-bottom: 10px;
}

.type-btn {
    padding: 10px 24px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
}

.type-btn:hover {
    transform: scale(1.05);
}

.type-btn.active {
    background: #fde047 !important;
    color: #991b1b !important;
    border-color: #fbbf24 !important;
    transform: scale(1.1);
}

.type-btn.all {
    background: white;
    color: #374151;
}

/* Type colors */
.type-fire { background: #f97316; color: white; }
.type-water { background: #3b82f6; color: white; }
.type-grass { background: #22c55e; color: white; }
.type-electric { background: #facc15; color: white; }
.type-psychic { background: #ec4899; color: white; }
.type-ice { background: #22d3ee; color: white; }
.type-dragon { background: #9333ea; color: white; }
.type-dark { background: #1f2937; color: white; }
.type-fairy { background: #fbcfe8; color: #1f2937; }
.type-normal { background: #9ca3af; color: white; }
.type-fighting { background: #b91c1c; color: white; }
.type-flying { background: #818cf8; color: white; }
.type-poison { background: #a855f7; color: white; }
.type-ground { background: #a16207; color: white; }
.type-rock { background: #854d0e; color: white; }
.type-bug { background: #84cc16; color: white; }
.type-ghost { background: #7e22ce; color: white; }
.type-steel { background: #6b7280; color: white; }

.content {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
}

.loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
}

.spinner {
    width: 64px;
    height: 64px;
    border: 4px solid #fde047;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

.loading-text {
    color: #fde047;
    margin-top: 20px;
    font-size: 0.8rem;
}

.pokemon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 24px;
}

.pokemon-card {
    background: #fef3c7;
    border: 4px solid #1f2937;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 0.3);
    transition: all 0.2s;
    animation: fadeInUp 0.3s ease-out both;
}

.pokemon-card:hover {
    transform: scale(1.05) rotate(1deg);
    border-color: #fbbf24;
    box-shadow: 6px 6px 0 0 rgba(251, 191, 36, 0.5);
}

.pokemon-image-container {
    background: linear-gradient(to bottom, white, #f3f4f6);
    padding: 16px;
}

.pokemon-image-box {
    background: white;
    border: 2px solid #1f2937;
    border-radius: 8px;
    padding: 8px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pokemon-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
}

.pokemon-info {
    padding: 16px;
    background: #fef3c7;
}

.pokemon-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.pokemon-id {
    color: #6b7280;
    font-size: 0.7rem;
}

.pokemon-name {
    font-size: 1rem;
    color: #1f2937;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.pokemon-types {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.type-badge {
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 0.5rem;
    text-transform: uppercase;
    border: 2px solid #1f2937;
    color: white;
}

.no-results {
    text-align: center;
    padding: 80px 20px;
}

.no-results p {
    color: #fde047;
    font-size: 1.2rem;
}

/* Detail Page */
#detail-page {
    background: linear-gradient(to bottom, #581c87, #3b0764);
}

.detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
}

.back-button {
    background: #fde047;
    color: #991b1b;
    border: 2px solid #fbbf24;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
}

.back-button:hover {
    transform: scale(1.1);
}

.back-button:active {
    transform: translate(2px, 2px);
}

.detail-title-container {
    flex: 1;
}

.detail-name {
    text-transform: uppercase;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
}

.detail-content {
    padding-bottom: 40px;
}

.detail-section {
    background: #fef3c7;
    border: 4px solid #1f2937;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 6px 6px 0 0 rgba(0, 0, 0, 0.3);
    animation: fadeInUp 0.3s ease-out both;
}

.section-header {
    padding: 16px;
    border-bottom: 2px solid #1f2937;
    color: white;
}

.section-header h2 {
    font-size: 1.2rem;
}

.section-content {
    padding: 24px;
}

.main-image-container {
    background: linear-gradient(to bottom, white, #f3f4f6);
    padding: 32px;
}

.main-image-box {
    background: white;
    border: 4px solid #1f2937;
    border-radius: 12px;
    padding: 32px;
    max-width: 400px;
    margin: 0 auto;
}

.main-image {
    width: 100%;
    height: auto;
    image-rendering: pixelated;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

.stat-box {
    text-align: center;
    background: white;
    border: 2px solid #1f2937;
    padding: 16px;
    border-radius: 8px;
}

.stat-label {
    font-size: 0.6rem;
    color: #6b7280;
    margin-bottom: 8px;
}

.stat-value {
    font-size: 1.2rem;
    color: #1f2937;
}

.stat-item {
    margin-bottom: 16px;
}

.stat-item-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
}

.stat-name {
    font-size: 0.7rem;
    color: #1f2937;
    text-transform: uppercase;
}

.stat-bar-container {
    background: white;
    border: 2px solid #1f2937;
    height: 24px;
    border-radius: 4px;
    overflow: hidden;
}

.stat-bar {
    background: #22c55e;
    height: 100%;
    border-right: 2px solid #1f2937;
    transition: width 0.5s ease-out;
}

.moves-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.move-box {
    background: white;
    border: 2px solid #1f2937;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
}

.move-name {
    font-size: 0.7rem;
    color: #1f2937;
    text-transform: uppercase;
}

.evolution-chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
}

.evolution-item {
    background: white;
    border: 2px solid #1f2937;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
}

.evolution-item:hover {
    transform: scale(1.1);
    border-color: #ec4899;
}

.evolution-item.current {
    ring: 4px;
    border-color: #fbbf24;
    box-shadow: 0 0 0 4px #fbbf24;
}

.evolution-image {
    width: 96px;
    height: 96px;
    object-fit: contain;
    image-rendering: pixelated;
}

.evolution-name {
    text-align: center;
    font-size: 0.7rem;
    color: #1f2937;
    text-transform: uppercase;
    margin-top: 8px;
}

.evolution-arrow {
    font-size: 2rem;
    color: #1f2937;
}

/* Animations */
@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes scaleIn {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0%, 100% {
        opacity: 1;
    }
    50% {
        opacity: 0.5;
    }
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* Responsive */
@media (max-width: 768px) {
    .pokemon-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 16px;
    }
    
    .stats-grid,
    .moves-grid {
        grid-template-columns: 1fr;
    }
    
    .type-filter {
        top: 100px;
    }
}
    </style>
</head>
<body>
    <!-- Intro Page -->
    <div id="intro-page" class="page active">
        <div class="intro-container">
            <div class="intro-content">
                <div class="title-animation">
                    <h1 class="retro-title">POKÉDEX</h1>
                    <div class="title-bar"></div>
                </div>
                <div class="intro-box">
                    <p class="tagline">GOTTA CATCH 'EM ALL!</p>
                </div>
                <button id="start-btn" class="retro-button">START</button>
                <p class="hint-text">Swipe left or press → to begin</p>
                <div class="pulse-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pokemon List Page -->
    <div id="list-page" class="page">
        <div class="header">
            <div class="header-content">
                <h1 class="header-title">POKÉDEX</h1>
                <p id="pokemon-count" class="pokemon-count">Loading...</p>
            </div>
        </div>
        
        <div class="type-filter">
            <div id="type-buttons" class="type-buttons"></div>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p class="loading-text">Loading Pokémon...</p>
            </div>
            <div id="pokemon-grid" class="pokemon-grid"></div>
            <div id="no-results" class="no-results" style="display: none;">
                <p>No Pokémon found for this type!</p>
            </div>
        </div>
    </div>

    <!-- Pokemon Detail Page -->
    <div id="detail-page" class="page">
        <div class="header">
            <div class="header-content detail-header">
                <button id="back-btn" class="back-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="detail-title-container">
                    <h1 id="detail-name" class="header-title detail-name"></h1>
                    <p id="detail-number" class="pokemon-count"></p>
                </div>
            </div>
        </div>

        <div class="content detail-content" id="detail-content">
            <!-- Detail content will be inserted here -->
        </div>
    </div>

    <script>
      // Global variables
let allPokemon = [];
let filteredPokemon = [];
let selectedType = 'all';
let currentPage = 'intro';
let touchStartX = 0;
let touchStartY = 0;

// Type colors mapping
const TYPE_COLORS = {
    fire: 'type-fire',
    water: 'type-water',
    grass: 'type-grass',
    electric: 'type-electric',
    psychic: 'type-psychic',
    ice: 'type-ice',
    dragon: 'type-dragon',
    dark: 'type-dark',
    fairy: 'type-fairy',
    normal: 'type-normal',
    fighting: 'type-fighting',
    flying: 'type-flying',
    poison: 'type-poison',
    ground: 'type-ground',
    rock: 'type-rock',
    bug: 'type-bug',
    ghost: 'type-ghost',
    steel: 'type-steel'
};

const TYPES = [
    'all', 'fire', 'water', 'grass', 'electric', 'psychic', 'ice',
    'dragon', 'dark', 'fairy', 'normal', 'fighting', 'flying',
    'poison', 'ground', 'rock', 'bug', 'ghost', 'steel'
];

// Page navigation
function showPage(pageId) {
    const pages = document.querySelectorAll('.page');
    const targetPage = document.getElementById(pageId);
    
    pages.forEach(page => {
        if (page.classList.contains('active')) {
            page.classList.add('exit-left');
            setTimeout(() => {
                page.classList.remove('active', 'exit-left');
            }, 500);
        }
    });
    
    setTimeout(() => {
        targetPage.classList.add('active');
        currentPage = pageId;
    }, 100);
}

// Touch and swipe handlers
function handleTouchStart(e) {
    touchStartX = e.touches ? e.touches[0].clientX : e.clientX;
    touchStartY = e.touches ? e.touches[0].clientY : e.clientY;
}

function handleTouchEnd(e) {
    const touchEndX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const touchEndY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const deltaX = touchEndX - touchStartX;
    const deltaY = Math.abs(touchEndY - touchStartY);
    
    // Only trigger swipe if horizontal movement is greater than vertical
    if (Math.abs(deltaX) > 50 && deltaY < 100) {
        if (currentPage === 'intro-page' && deltaX < -50) {
            showPage('list-page');
        } else if (currentPage === 'list-page' && deltaX > 50) {
            showPage('intro-page');
        } else if (currentPage === 'detail-page' && deltaX > 50) {
            showPage('list-page');
        }
    }
}

// Initialize type filter buttons
function initTypeButtons() {
    const container = document.getElementById('type-buttons');
    container.innerHTML = '';
    
    TYPES.forEach(type => {
        const button = document.createElement('button');
        button.className = `type-btn ${type === 'all' ? 'all active' : TYPE_COLORS[type] || ''}`;
        button.textContent = type;
        button.onclick = () => filterByType(type);
        container.appendChild(button);
    });
}

// Filter Pokemon by type
function filterByType(type) {
    selectedType = type;
    
    // Update button states
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent === type) {
            btn.classList.add('active');
        }
    });
    
    // Filter Pokemon
    if (type === 'all') {
        filteredPokemon = [...allPokemon];
    } else {
        filteredPokemon = allPokemon.filter(p => p.types.includes(type));
    }
    
    displayPokemon();
}

// Fetch all Pokemon
async function fetchAllPokemon() {
    try {
        const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151');
        const data = await response.json();
        
        const pokemonPromises = data.results.map(async (p) => {
            const details = await fetch(p.url);
            const detailData = await details.json();
            return {
                id: detailData.id,
                name: detailData.name,
                image: detailData.sprites.other['official-artwork'].front_default || 
                       detailData.sprites.front_default,
                types: detailData.types.map(t => t.type.name)
            };
        });
        
        allPokemon = await Promise.all(pokemonPromises);
        filteredPokemon = [...allPokemon];
        
        document.getElementById('loading').style.display = 'none';
        displayPokemon();
    } catch (error) {
        console.error('Error fetching Pokemon:', error);
        document.getElementById('loading').innerHTML = '<p class="loading-text">Error loading Pokémon!</p>';
    }
}

// Display Pokemon grid
function displayPokemon() {
    const grid = document.getElementById('pokemon-grid');
    const noResults = document.getElementById('no-results');
    const count = document.getElementById('pokemon-count');
    
    count.textContent = `${filteredPokemon.length} Pokémon Found`;
    
    if (filteredPokemon.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
    }
    
    noResults.style.display = 'none';
    grid.innerHTML = '';
    
    filteredPokemon.forEach((pokemon, index) => {
        const card = createPokemonCard(pokemon, index);
        grid.appendChild(card);
    });
}

// Create Pokemon card
function createPokemonCard(pokemon, index) {
    const card = document.createElement('div');
    card.className = 'pokemon-card';
    card.style.animationDelay = `${index * 0.03}s`;
    card.onclick = () => showPokemonDetail(pokemon.id);
    
    card.innerHTML = `
        <div class="pokemon-image-container">
            <div class="pokemon-image-box">
                <img src="${pokemon.image}" alt="${pokemon.name}" class="pokemon-image" loading="lazy">
            </div>
        </div>
        <div class="pokemon-info">
            <div class="pokemon-header">
                <span class="pokemon-id">#${pokemon.id.toString().padStart(3, '0')}</span>
            </div>
            <h3 class="pokemon-name">${pokemon.name}</h3>
            <div class="pokemon-types">
                ${pokemon.types.map(type => 
                    `<span class="type-badge ${TYPE_COLORS[type]}">${type}</span>`
                ).join('')}
            </div>
        </div>
    `;
    
    return card;
}

// Fetch Pokemon details
async function showPokemonDetail(id) {
    showPage('detail-page');
    
    const detailContent = document.getElementById('detail-content');
    detailContent.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    try {
        // Fetch Pokemon data
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const pokemon = await response.json();
        
        // Fetch species for evolution chain
        const speciesResponse = await fetch(pokemon.species.url);
        const speciesData = await speciesResponse.json();
        
        // Fetch evolution chain
        const evolutionResponse = await fetch(speciesData.evolution_chain.url);
        const evolutionData = await evolutionResponse.json();
        
        // Parse evolution chain
        const evolutionChain = [];
        let currentEvolution = evolutionData.chain;
        
        while (currentEvolution) {
            const pokemonId = currentEvolution.species.url.split('/').slice(-2, -1)[0];
            evolutionChain.push({
                name: currentEvolution.species.name,
                id: parseInt(pokemonId)
            });
            currentEvolution = currentEvolution.evolves_to[0];
        }
        
        // Update header
        document.getElementById('detail-name').textContent = pokemon.name;
        document.getElementById('detail-number').textContent = `#${pokemon.id.toString().padStart(3, '0')}`;
        
        // Display details
        displayPokemonDetail(pokemon, evolutionChain);
    } catch (error) {
        console.error('Error fetching Pokemon details:', error);
        detailContent.innerHTML = '<p class="loading-text">Error loading Pokémon details!</p>';
    }
}

                            <div class="evolution-item ${evo.id === pokemon.id ? 'current' : ''}" 
                                 onclick="showPokemonDetail(${evo.id})">
                                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${evo.id}.png"

// Initialize app
document.addEventListener('DOMContentLoaded', () => {
    // Event listeners for intro page
    document.getElementById('start-btn').addEventListener('click', () => {
        showPage('list-page');
    });
    
    // Event listener for back button
    document.getElementById('back-btn').addEventListener('click', () => {
        showPage('list-page');
    });
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (currentPage === 'intro-page' && (e.key === 'ArrowRight' || e.key === 'Enter')) {
            showPage('list-page');
        } else if (currentPage === 'list-page' && e.key === 'ArrowLeft') {
            showPage('intro-page');
        } else if (currentPage === 'detail-page' && e.key === 'ArrowLeft') {
            showPage('list-page');
        }
    });
    
    // Touch/swipe events for all pages
    const pages = document.querySelectorAll('.page');
    pages.forEach(page => {
        page.addEventListener('touchstart', handleTouchStart, { passive: true });
        page.addEventListener('touchend', handleTouchEnd, { passive: true });
        page.addEventListener('mousedown', handleTouchStart);
        page.addEventListener('mouseup', handleTouchEnd);
    });
    
    // Initialize type buttons and fetch Pokemon
    initTypeButtons();
    fetchAllPokemon();
});
    </script>
